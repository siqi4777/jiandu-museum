<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>简牍博物馆 · 我的</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="profile">
  <div class="app-container">
    
    <header class="header">
      <div class="logo-section">
        <span class="logo-dream">JIANDU</span>
        <span class="logo-street">MUSEUM</span>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn dots-btn" aria-label="更多菜单">
          <span class="dot"></span>
          <span class="dot middle"></span>
          <span class="dot"></span>
        </button>
        <button class="header-icon-btn circle-btn" aria-label="搜索"></button>
      </div>
    </header>

    <div class="page-title-bar">
      <h2 id="pageTitle">我的</h2>
      <button class="theme-toggle" id="themeToggle">
        <span class="toggle-icon">☀️</span>
        <span>白昼模式</span>
      </button>
    </div>

    <main class="main-content" id="appContent">
      <!-- 动态渲染 -->
    </main>

    <nav class="bottom-nav">
      <div class="nav-item" data-page="explore">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">探索</span>
      </div>
      <div class="nav-item" data-page="collection">
        <span class="nav-icon">🏛️</span>
        <span class="nav-label">馆藏</span>
      </div>
      <div class="nav-item" data-page="tasks">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">成就</span>
      </div>
      <div class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">我的</span>
      </div>
    </nav>

  </div>

  <script src="js/pages.js"></script>
  <script src="js/router.js"></script>
  <script>
    const pageName = 'profile';
    let currentSubPage = 'home';
    const subPageStack = ['home'];

    function renderPage(subPage) {
      const template = pageTemplates[pageName][subPage];
      if (!template) return;
      
      document.getElementById('pageTitle').textContent = template.title;
      document.getElementById('appContent').innerHTML = template.html;
      
      bindSubPageEvents();
    }

    function navigateTo(subPage) {
      subPageStack.push(subPage);
      currentSubPage = subPage;
      renderPage(subPage);
    }

    function goBack() {
      if (subPageStack.length > 1) {
        subPageStack.pop();
        currentSubPage = subPageStack[subPageStack.length - 1];
        renderPage(currentSubPage);
      }
    }

    function bindSubPageEvents() {
      document.querySelectorAll('.clickable[data-subpage]').forEach(el => {
        el.addEventListener('click', function() {
          const subPage = this.getAttribute('data-subpage');
          navigateTo(subPage);
        });
      });
      
      document.querySelectorAll('.back-button').forEach(btn => {
        btn.addEventListener('click', goBack);
      });
    }

    document.querySelector('.circle-btn').addEventListener('click', function() {
      alert('🔍 搜索功能（待开发）');
    });
    
    document.querySelector('.dots-btn').addEventListener('click', function() {
      alert('··· 更多菜单（待开发）');
    });

    // 日夜模式（先执行）
    const themeToggle = document.getElementById('themeToggle');
    function updateThemeButton() {
      const icon = themeToggle.querySelector('.toggle-icon');
      const text = themeToggle.querySelector('span:last-child');
      if (document.body.classList.contains('dark-mode')) {
        icon.textContent = '🌙'; text.textContent = '暗夜模式';
      } else {
        icon.textContent = '☀️'; text.textContent = '白昼模式';
      }
    }
    themeToggle.addEventListener('click', function() {
      document.body.classList.toggle('dark-mode');
      updateThemeButton();
      localStorage.setItem('themeMode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });
    if (localStorage.getItem('themeMode') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    updateThemeButton();

    // 渲染页面（后执行）
    renderPage('home');
  </script>
</body>
</html>
