<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>简牍博物馆 · 深度模式</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="deep-mode">
  <div class="app-container">
    
    <header class="header">
      <div class="logo-section clickable" id="logoLink" style="cursor:pointer;">
        <span class="logo-dream">JIANDU</span>
        <span class="logo-street">MUSEUM</span>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn dots-btn" aria-label="更多菜单">
          <span class="dot"></span>
          <span class="dot middle"></span>
          <span class="dot"></span>
        </button>
        <button class="header-icon-btn circle-btn" aria-label="搜索"></button>
      </div>
    </header>

<div class="page-title-bar">
  <h2 id="pageTitle">
    <span class="game-back-arrow" id="gameBackArrow">←</span>
    深度模式
  </h2>
  <button class="theme-toggle" id="themeToggle">
    <span class="toggle-icon">☀️</span>
    <span>白昼模式</span>
  </button>
</div>

    <main class="main-content" id="modeContent">
      <!-- 动态渲染 -->
    </main>

  </div>

  <script src="js/game-modes.js"></script>
  <script>
    document.getElementById('logoLink').addEventListener('click', function() {
      window.location.href = 'collection.html';
    });

    document.getElementById('gameBackArrow').addEventListener('click', function() {
      if (document.referrer && document.referrer.indexOf('deep-mode.html') === -1) {
        window.location.href = document.referrer;
      } else {
        window.location.href = 'game.html';
      }
    });

    document.querySelector('.circle-btn').addEventListener('click', function() {
      window.location.href = 'collection.html';
    });
    
    document.querySelector('.dots-btn').addEventListener('click', function() {
      window.location.href = 'collection.html';
    });

    DeepMode.init();
    // 日夜模式
const themeToggle = document.getElementById('themeToggle');
function updateThemeButton() {
  const icon = themeToggle.querySelector('.toggle-icon');
  const text = themeToggle.querySelector('span:last-child');
  if (document.body.classList.contains('dark-mode')) {
    icon.textContent = '🌙'; text.textContent = '暗夜模式';
  } else {
    icon.textContent = '☀️'; text.textContent = '白昼模式';
  }
}
themeToggle.addEventListener('click', function() {
  document.body.classList.toggle('dark-mode');
  updateThemeButton();
  localStorage.setItem('themeMode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
});
if (localStorage.getItem('themeMode') === 'dark') {
  document.body.classList.add('dark-mode');
}
updateThemeButton();
  </script>
</body>
</html>
