<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>简牍博物馆 · 探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <!-- Three.js CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body data-page="explore">
  <div class="app-container">
    
    <header class="header">
      <div class="logo-section clickable" id="logoLink" style="cursor:pointer;">
        <span class="logo-dream">JIANDU</span>
        <span class="logo-street">MUSEUM</span>
      </div>
      <div class="header-actions">
        <button class="header-icon-btn dots-btn" aria-label="更多菜单">
          <span class="dot"></span>
          <span class="dot middle"></span>
          <span class="dot"></span>
        </button>
        <button class="header-icon-btn circle-btn" aria-label="搜索"></button>
      </div>
    </header>

    <div class="page-title-bar">
      <h2 id="pageTitle">展厅地图</h2>
      <button class="theme-toggle" id="themeToggle">
        <span class="toggle-icon">☀️</span>
        <span>白昼模式</span>
      </button>
    </div>

    <!-- 3D 地图容器 -->
    <main class="main-content" id="appContent" style="padding:0;overflow:hidden;position:relative;">
      <div id="threeContainer" style="width:100%;height:calc(100vh - 86px);background:#ffffff;"></div>
      <!-- 左下角功能按钮 -->
      <div style="position:absolute;bottom:130px;left:16px;display:flex;flex-direction:column;gap:12px;z-index:10;">
        <button id="scanBtn" style="width:48px;height:48px;border-radius:50%;background:#DF1D16;color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(223,29,22,0.35);display:flex;align-items:center;justify-content:center;">📷</button>
        <button id="voiceBtn" style="width:48px;height:48px;border-radius:50%;background:#71C2E4;color:white;border:none;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(113,194,228,0.35);display:flex;align-items:center;justify-content:center;">🎧</button>
      </div>
      <!-- 楼层切换按钮 -->
      <div style="position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:flex;gap:0;z-index:10;">
        <button class="floor-btn active" data-floor="F1" style="padding:10px 20px;border:2px solid #DF1D16;background:#DF1D16;color:white;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;border-radius:12px 0 0 12px;">1F</button>
        <button class="floor-btn" data-floor="F2" style="padding:10px 20px;border:2px solid #e0e0e0;background:white;color:#666;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;border-left:none;">2F</button>
        <button class="floor-btn" data-floor="B1" style="padding:10px 20px;border:2px solid #e0e0e0;background:white;color:#666;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;border-left:none;border-radius:0 12px 12px 0;">B1</button>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="nav-item active" data-page="explore">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">探索</span>
      </div>
      <div class="nav-item" data-page="collection">
        <span class="nav-icon">🏛️</span>
        <span class="nav-label">馆藏</span>
      </div>
      <div class="nav-item" data-page="tasks">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">成就</span>
      </div>
      <div class="nav-item" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">我的</span>
      </div>
    </nav>

  </div>

  <script src="js/pages.js"></script>
  <script src="js/router.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ========== Three.js 场景初始化 ==========
    const container = document.getElementById('threeContainer');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#ffffff');
    
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
    camera.position.set(8, 6, 8);
    camera.lookAt(0, 0, 0);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);
    
    const fillLight = new THREE.DirectionalLight(0x71C2E4, 0.5);
    fillLight.position.set(-3, 2, -3);
    scene.add(fillLight);
    
    const groundGeometry = new THREE.PlaneGeometry(12, 12);
    const groundMaterial = new THREE.MeshStandardMaterial({ 
      color: 0xe8e4df, 
      roughness: 0.5,
      metalness: 0.05,
      side: THREE.DoubleSide
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3.999;
    scene.add(ground);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3;
    controls.maxDistance = 15;
    controls.maxPolarAngle = Math.PI / 2.2;
    
    const loader = new GLTFLoader();
    let currentModel = null;
    
    // ========== 气泡系统 ==========
    const bubbleData = {
      'F1': [
        { x: 1.5, y: 0.6, z: 1.5, icon: '📜', title: '三国吴简', desc: '走马楼出土 · 10万余枚' },
        { x: -1.5, y: 0.6, z: 1.5, icon: '🏛️', title: '中国简牍', desc: '战国至魏晋 · 全国发现' },
        { x: 1.5, y: 0.6, z: -1.5, icon: '🌍', title: '世界文字载体', desc: '全球文字书写材料' },
        { x: -1.5, y: 0.6, z: -1.5, icon: '✍️', title: '简牍书法', desc: '书法演变历程' },
        { x: 0, y: 1.0, z: 0, icon: '🏆', title: '入口大厅', desc: '文明之路由此开始' }
      ],
      'F2': [
        { x: 1.5, y: 0.6, z: 1.5, icon: '🏔️', title: '湘水溯源', desc: '湘江流域简牍分布' },
        { x: -1.5, y: 0.6, z: 1.5, icon: '🏺', title: '简牍之乡', desc: '湖南考古大发现' },
        { x: 1.5, y: 0.6, z: -1.5, icon: '📚', title: '地下书库', desc: '出土文献珍藏' },
        { x: -1.5, y: 0.6, z: -1.5, icon: '🔬', title: '学术价值', desc: '研究成果展示' }
      ],
      'B1': [
        { x: 1.5, y: 0.6, z: 1.5, icon: '🔍', title: '简牍探源', desc: '发掘现场还原' },
        { x: -1.5, y: 0.6, z: 1.5, icon: '📦', title: '文物库房', desc: '馆藏珍品保管' },
        { x: 1.5, y: 0.6, z: -1.5, icon: '🧪', title: '修复工坊', desc: '简牍修复技术' },
        { x: -1.5, y: 0.6, z: -1.5, icon: '🎓', title: '研学中心', desc: '学术交流空间' }
      ]
    };
    
    let bubbleSprites = [];
    
    function createBubbles(floorName) {
      bubbleSprites.forEach(sprite => scene.remove(sprite));
      bubbleSprites = [];
      
      const points = bubbleData[floorName] || [];
      const bgColor = floorName === 'F2' ? '#71C2E4' : '#DF1D16';
      
      points.forEach(point => {
        // 纯图标气泡（无文字）
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        
        // 圆形背景
        ctx.fillStyle = bgColor;
        ctx.beginPath();
        ctx.arc(32, 28, 22, 0, Math.PI * 2);
        ctx.fill();
        
        // 尖角向下
        ctx.beginPath();
        ctx.moveTo(24, 46);
        ctx.lineTo(32, 56);
        ctx.lineTo(40, 46);
        ctx.closePath();
        ctx.fill();
        
        // 图标
        ctx.fillStyle = '#fff';
        ctx.font = '26px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(point.icon, 32, 28);
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const material = new THREE.SpriteMaterial({ 
          map: texture,
          transparent: true,
          depthTest: false,
          depthWrite: false
        });
        const sprite = new THREE.Sprite(material);
        sprite.position.set(point.x, point.y, point.z);
        sprite.scale.set(0.55, 0.55, 1);
        sprite.userData = point;
        
        scene.add(sprite);
        bubbleSprites.push(sprite);
      });
    }
    
    // 气泡点击检测
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    
    function onCanvasClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(bubbleSprites);
      
      if (intersects.length > 0) {
        const point = intersects[0].object.userData;
        showBubblePopup(point, event.clientX, event.clientY);
      } else {
        removeBubblePopup();
      }
    }
    
    renderer.domElement.addEventListener('click', onCanvasClick);
    
    function showBubblePopup(point, cx, cy) {
      removeBubblePopup();
      
      const popup = document.createElement('div');
      popup.id = 'bubblePopup';
      popup.style.cssText = `
        position: fixed; top: ${cy - 140}px; left: ${cx - 110}px;
        background: white; border-radius: 16px; padding: 20px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 999;
        text-align: center; width: 220px; animation: fadeIn 0.3s ease;
      `;
      popup.innerHTML = `
        <div style="font-size:40px;margin-bottom:4px;">${point.icon}</div>
        <h4 style="font-weight:600;margin:4px 0;font-size:16px;color:#333;">${point.title}</h4>
        <p style="font-size:13px;color:#888;margin-bottom:10px;">${point.desc}</p>
        <a href="collection.html" style="display:inline-block;background:#DF1D16;color:#fff;text-decoration:none;padding:8px 20px;border-radius:12px;font-size:13px;font-weight:600;">查看详情 →</a>
        <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:10px solid white;"></div>
      `;
      
      document.body.appendChild(popup);
    }
    
    function removeBubblePopup() {
      const popup = document.getElementById('bubblePopup');
      if (popup) popup.remove();
    }
    
    // 点击页面其他地方关闭弹窗
    document.addEventListener('click', function(event) {
      const popup = document.getElementById('bubblePopup');
      if (popup && !popup.contains(event.target) && event.target !== renderer.domElement) {
        popup.remove();
      }
    });
    
    // ========== 加载模型 ==========
    function loadModel(floorName) {
      if (currentModel) {
        scene.remove(currentModel);
        currentModel = null;
      }
      removeBubblePopup();
      
      const modelPath = `assets/models/${floorName}.glb`;
      
      loader.load(
        modelPath,
        (gltf) => {
          currentModel = gltf.scene;
          
          const box = new THREE.Box3().setFromObject(currentModel);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 8 / maxDim;
          
          currentModel.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
          currentModel.scale.set(scale, scale, scale);
          
          const modelBottom = box.min.y * scale - center.y * scale;
          ground.position.y = modelBottom + 0.05;
          
          currentModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              
              if (floorName === 'F2' || floorName === 'B1') {
                if (child.material) {
                  const materials = Array.isArray(child.material) ? child.material : [child.material];
                  materials.forEach(mat => {
                    mat.map = null;
                    mat.normalMap = null;
                    mat.roughnessMap = null;
                    mat.metalnessMap = null;
                    mat.aoMap = null;
                    mat.color.set('#8BC4DE');
                    mat.roughness = 0.35;
                    mat.metalness = 0.3;
                    mat.needsUpdate = true;
                  });
                }
              }
            }
          });
          
          scene.add(currentModel);
          createBubbles(floorName);
          
          document.querySelectorAll('.floor-btn').forEach(btn => {
            if (btn.getAttribute('data-floor') === floorName) {
              btn.style.background = floorName === 'F2' ? '#71C2E4' : '#DF1D16';
              btn.style.color = 'white';
              btn.style.borderColor = floorName === 'F2' ? '#71C2E4' : '#DF1D16';
              btn.classList.add('active');
            } else {
              btn.style.background = 'white';
              btn.style.color = '#666';
              btn.style.borderColor = '#e0e0e0';
              btn.classList.remove('active');
            }
          });
          
          const titles = {
            'F1': '1F · 文明之路',
            'F2': '2F · 湘水流过',
            'B1': 'B1 · 简牍探源'
          };
          document.getElementById('pageTitle').textContent = titles[floorName] || '展厅地图';
        },
        (progress) => {
          console.log(`加载中: ${(progress.loaded / progress.total * 100).toFixed(0)}%`);
        },
        (error) => {
          console.error('模型加载失败:', error);
          showPlaceholder(floorName);
        }
      );
    }
    
    function showPlaceholder(floorName) {
      const geometry = new THREE.BoxGeometry(3, 1, 3);
      const material = new THREE.MeshStandardMaterial({ 
        color: floorName === 'F2' ? 0x71C2E4 : 0xDF1D16,
        transparent: true,
        opacity: 0.6
      });
      const placeholder = new THREE.Mesh(geometry, material);
      placeholder.name = 'placeholder';
      currentModel = placeholder;
      scene.add(placeholder);
      createBubbles(floorName);
      alert(`${floorName} 模型加载失败，请将模型文件放入 assets/models/ 文件夹`);
    }
    
    loadModel('F1');
    
    document.querySelectorAll('.floor-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const floor = this.getAttribute('data-floor');
        loadModel(floor);
      });
    });
    
    function animate() {
      requestAnimationFrame(animate);
      
      // 气泡上下浮动
      bubbleSprites.forEach((sprite, i) => {
        sprite.position.y += Math.sin(Date.now() * 0.002 + i) * 0.0008;
      });
      
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // ========== 页面逻辑 ==========
    document.getElementById('logoLink').addEventListener('click', function() {
      window.location.href = 'collection.html';
    });

    document.getElementById('scanBtn').addEventListener('click', function() {
      openCameraForScan();
    });
    
    document.getElementById('voiceBtn').addEventListener('click', function() {
      alert('🎧 语音导览功能开发中，敬请期待！');
    });

    let scanTaskCount = 0;
    const maxScanTasks = 3;

    function openCameraForScan() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        doSimulateScan();
        return;
      }
      
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      }).then((stream) => {
        showCameraPopup(stream);
      }).catch(() => {
        doSimulateScan();
      });
    }

    function showCameraPopup(stream) {
      const old = document.getElementById('cameraPopup');
      if (old) old.remove();
      
      const popup = document.createElement('div');
      popup.id = 'cameraPopup';
      popup.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;';
      
      popup.innerHTML = `
        <video id="camVideo" autoplay playsinline style="width:100%;height:65%;object-fit:cover;"></video>
        <div style="padding:20px;text-align:center;color:white;">
          <p style="font-size:14px;margin-bottom:16px;">对准文物或简牍拍照</p>
          <button id="takePhotoBtn" style="width:70px;height:70px;border-radius:50%;border:4px solid white;background:rgba(255,255,255,0.2);cursor:pointer;font-size:28px;">📸</button>
          <p style="font-size:11px;margin-top:8px;opacity:0.6;">点击拍照 (${scanTaskCount}/${maxScanTasks})</p>
          <button id="closeCamBtn" style="margin-top:12px;background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.3);padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer;">关闭</button>
        </div>
      `;
      
      document.body.appendChild(popup);
      document.getElementById('camVideo').srcObject = stream;
      
      document.getElementById('takePhotoBtn').addEventListener('click', () => {
        stream.getTracks().forEach(t => t.stop());
        popup.remove();
        doSimulateScan();
      });
      
      document.getElementById('closeCamBtn').addEventListener('click', () => {
        stream.getTracks().forEach(t => t.stop());
        popup.remove();
      });
    }

    function doSimulateScan() {
      scanTaskCount++;
      
      const toast = document.createElement('div');
      toast.style.cssText = `
        position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
        background:rgba(0,0,0,0.85);color:white;padding:20px 30px;
        border-radius:16px;text-align:center;z-index:9999;font-size:15px;
      `;
      toast.innerHTML = `
        <span style="font-size:40px;">✅</span>
        <p style="margin-top:8px;">识别成功！(${scanTaskCount}/${maxScanTasks})</p>
      `;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1500);
      
      if (scanTaskCount >= maxScanTasks) {
        setTimeout(() => {
          const toast2 = document.createElement('div');
          toast2.style.cssText = `
            position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.9);color:white;padding:24px 30px;
            border-radius:20px;text-align:center;z-index:9999;
          `;
          toast2.innerHTML = `
            <span style="font-size:48px;">🏆</span>
            <p style="margin:12px 0;font-weight:600;">全部任务完成！</p>
            <a href="tasks.html" style="display:inline-block;margin-top:8px;background:#DF1D16;color:white;text-decoration:none;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;">🏅 查看成就</a>
          `;
          document.body.appendChild(toast2);
          setTimeout(() => toast2.remove(), 4000);
        }, 1000);
      }
    }

    // 日夜模式
    const themeToggle = document.getElementById('themeToggle');
    function updateThemeButton() {
      const icon = themeToggle.querySelector('.toggle-icon');
      const text = themeToggle.querySelector('span:last-child');
      if (document.body.classList.contains('dark-mode')) {
        icon.textContent = '🌙'; text.textContent = '暗夜模式';
        scene.background = new THREE.Color('#1a1a2e');
      } else {
        icon.textContent = '☀️'; text.textContent = '白昼模式';
        scene.background = new THREE.Color('#ffffff');
      }
    }
    themeToggle.addEventListener('click', function() {
      document.body.classList.toggle('dark-mode');
      updateThemeButton();
      localStorage.setItem('themeMode', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    });
    if (localStorage.getItem('themeMode') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    updateThemeButton();
  </script>
</body>
</html>
